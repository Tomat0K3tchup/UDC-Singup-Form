<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liability Release</title>

    <link rel="icon" type="image/png" href="/assets/udc-logo-tiny.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
      integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/css/stylesheet.css" />
    <link rel="stylesheet" href="/css/udc.css" />

    <!-- Duet Date Picker -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@duetds/date-picker@1.4.0/dist/duet/duet.esm.js"></script>

    <!-- signature_pad -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.4/dist/signature_pad.umd.min.js"></script>

    <!-- Alpine.js -->
    <script type="module">
      import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3/dist/module.esm.js";
      import alpineI18nPlugin from "/js/alpine-i18n.js";
      import "/js/alpine-components.js";

      Alpine.plugin(alpineI18nPlugin);
      window.Alpine = Alpine;
      Alpine.start();
    </script>
  </head>
  <body>
    <div class="formWidth formDropShadow">
      <form
        name="liability-form"
        id="liability-form"
        enctype="multipart/form-data"
        x-data="wizardForm"
        @submit.prevent="submitForm"
        x-cloak
      >
        <div class="formWrapper">
          <!-- Header -->
          <header class="formHeader">
            <h1 x-text="$t('liability:title')" x-show="$store.i18n.ready"></h1>
            <select
              class="langSelect"
              @change="$store.i18n.lang = $event.target.value; switchLang($event.target.value)"
            >
              <template x-for="lng in supportedLngs" :key="lng">
                <option :value="lng" x-text="lng.toUpperCase()" :selected="lng === $store.i18n.lang"></option>
              </template>
            </select>
          </header>

          <!-- Wizard -->
          <div x-show="!success" class="wizardContent">
            <input type="hidden" name="pkg" :value="pkg" />
            <input type="hidden" name="form_language" :value="$store.i18n.lang" />

            <!-- Step 1: Personal Details -->
            <fieldset class="formStep" x-show="isStep($el)" x-cloak>
              <legend x-text="$t('personal.title')"></legend>

              <div class="multiInput" id="full_name">
                <div class="formInput" :class="showError && 'invalid'" x-data="formField">
                  <label for="first_name" x-text="$t('personal.firstName')"></label>
                  <input
                    name="first_name"
                    id="first_name"
                    required
                    @blur="validate"
                    @invalid.prevent="onInvalid"
                    @input="clearError"
                  />
                  <span x-show="showError" x-cloak x-text="error"></span>
                </div>
                <div class="formInput" :class="showError && 'invalid'" x-data="formField">
                  <label for="last_name" x-text="$t('personal.lastName')"></label>
                  <input
                    name="last_name"
                    id="last_name"
                    required
                    @blur="validate"
                    @invalid.prevent="onInvalid"
                    @input="clearError"
                  />
                  <span x-show="showError" x-cloak x-text="error"></span>
                </div>
              </div>

              <div
                class="formInput udcDatePicker"
                :class="showError && 'invalid'"
                id="dob"
                required
                x-data="udcDatePicker"
                @invalid.prevent="onInvalid"
              >
                <label :class="showError && 'invalid'" x-text="$t('personal.dob')"></label>
                <duet-date-picker identifier="dob" min="1926-01-01"></duet-date-picker>
                <input type="hidden" name="dob" :value="dateValue" />
                <span class="invalid" x-show="showError" x-cloak x-text="error"></span>
              </div>

              <div class="formInput" x-data="formField">
                <fieldset>
                  <legend :class="showError && 'invalid'" x-text="$t('emergency.di.label')"></legend>
                  <p class="radioOption">
                    <input
                      type="radio"
                      id="di_yes"
                      name="di"
                      value="Yes"
                      x-model="di"
                      required
                      @invalid.prevent="onInvalid"
                      @change="clearError"
                    />
                    <label for="di_yes">Yes</label>
                  </p>
                  <p class="radioOption">
                    <input
                      type="radio"
                      id="di_no"
                      name="di"
                      value="No"
                      x-model="di"
                      @invalid.prevent="onInvalid"
                      @change="clearError"
                    />
                    <label for="di_no">No</label>
                  </p>
                </fieldset>
                <span class="invalid" x-show="showError" x-cloak x-text="error"></span>
              </div>

              <fieldset class="flx-form" x-show="di === 'Yes'" x-transition>
                <div class="formInput" x-data="formField">
                  <label for="di_policy_nb" x-text="$t('emergency.diPolicyNb')"></label>
                  <input name="di_policy_nb" id="di_policy_nb" />
                </div>
              </fieldset>
            </fieldset>

            <!-- Step 2: Liability Release + Signature -->
            <fieldset
              class="formStep legal"
              x-show="isStep($el)"
              x-effect="if (isStep($el)) $nextTick(() => mirrorName())"
              x-cloak
            >
              <p x-text="$t('liability:intro')"></p>

              <!-- Non-agency section -->
              <section>
                <h3 x-text="$t('liability:nonAgency.title')"></h3>
                <p x-html="$t('liability:nonAgency.nonPadi')"></p>
                <p x-text="$t('liability:nonAgency.franchise')"></p>
                <p
                  x-html="$t(isCourse ? 'liability:nonAgency.padiLiability.courses' : 'liability:nonAgency.padiLiability.general')"
                ></p>
              </section>

              <!-- General Liability (fun dives only) -->
              <section x-show="!isCourse">
                <h3 x-text="$t('liability:riskAgreement.title')"></h3>
                <p x-html="$t('liability:riskAgreement.knowledgeRisk')"></p>
                <p x-html="$t('liability:riskAgreement.dcsRisk')"></p>
                <p x-html="$t('liability:riskAgreement.boatRisk')"></p>
                <p x-html="$t('liability:riskAgreement.udcLiability')"></p>
                <p x-html="$t('liability:riskAgreement.goodHealth')"></p>
                <p x-html="$t('liability:riskAgreement.divePractices')"></p>
                <p x-html="$t('liability:riskAgreement.boatDiving')"></p>
                <p x-html="$t('liability:riskAgreement.refresher')"></p>
                <p x-html="$t('liability:riskAgreement.staffLiability')"></p>
                <p x-html="$t('liability:riskAgreement.gearLiability')"></p>
                <p x-html="$t('liability:riskAgreement.rescue')"></p>
                <p x-html="$t('liability:riskAgreement.validityPeriod')"></p>
                <p x-html="$t('liability:riskAgreement.lawfulAge')"></p>
                <p x-html="$t('liability:riskAgreement.legalStatement')"></p>
                <p x-html="$t('liability:riskAgreement.fullyInformed')"></p>
              </section>

              <!-- Course Liability (ow, aow, goPro) -->
              <section x-show="isCourse">
                <h3 x-text="$t('liability:riskAgreement.title')"></h3>
                <p x-html="$t('liability:courses.ow.knowledgeRisk')"></p>
                <p x-html="$t('liability:courses.ow.dcsRisk')"></p>
                <p x-html="$t('liability:courses.ow.boatRisk')"></p>
                <p x-show="isConEd" x-html="$t('liability:courses.conEd.allTraining')"></p>
                <p
                  x-html="$t(isConEd ? 'liability:courses.conEd.udcLiability' : 'liability:courses.ow.udcLiability')"
                ></p>
                <p x-html="$t('liability:courses.ow.personalRisk')"></p>
                <p
                  x-html="$t(isConEd ? 'liability:courses.conEd.staffLiability' : 'liability:courses.ow.staffLiability')"
                ></p>
                <p x-show="isConEd" x-html="$t('liability:courses.conEd.medicalCondition')"></p>
                <p x-html="$t('liability:courses.ow.divingRisk')"></p>
                <p x-html="$t('liability:courses.ow.lawfulAge')"></p>
                <p x-show="isConEd" x-html="$t('liability:courses.conEd.validityPeriod')"></p>
                <p x-html="$t('liability:courses.ow.liabilityWaiver')"></p>
                <p x-show="isConEd" x-html="$t('liability:courses.conEd.completedMedical')"></p>
                <p
                  x-html="$t(isConEd ? 'liability:courses.conEd.legalStatement' : 'liability:courses.ow.legalStatement')"
                ></p>
                <p x-html="$t('liability:courses.ow.fullyInformed')"></p>
              </section>

              <!-- Signature -->
              <div
                class="formInput udcSignature"
                id="signature"
                required
                x-data="udcSignature"
                :class="showError && 'invalid'"
                @invalid.prevent="onInvalid"
              >
                <div class="sigHeader">
                  <label x-text="$t('liability.signature')"></label>
                  <button type="button" class="sigClearBtn" @click="clearSignature()">Clear</button>
                </div>
                <div class="sigWrapper">
                  <canvas x-ref="canvas"></canvas>
                </div>
                <input type="hidden" name="signature" :value="signatureValue" />
                <span class="invalid" x-show="showError" x-cloak x-text="error"></span>
              </div>
            </fieldset>

            <!-- Wizard navigation -->
            <div class="wizardNav">
              <button
                type="button"
                class="wizardBtn secondary"
                x-show="step > 0"
                @click="prevStep()"
                x-text="$t('wizard.prev')"
              ></button>
              <span x-show="step === 0" class="wizardSpacer"></span>
              <p class="stepCounter">
                <span x-text="step + 1"></span>
                <span x-text="$t('wizard.xStepsOfTotal')"></span>
                <span x-text="totalSteps"></span>
              </p>
              <button
                type="button"
                class="wizardBtn primary"
                @click="nextStep()"
                x-text="step === totalSteps - 1 ? $t('wizard.submit') : $t('wizard.next')"
              ></button>
            </div>
          </div>

          <!-- Success display -->
          <div class="successDisplay" x-show="success" x-cloak>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" class="successIcon">
              <path
                fill="#FFD43B"
                d="M438.6 105.4c12.5 12.5 12.5 32.8 0 45.3l-256 256c-12.5 12.5-32.8 12.5-45.3 0l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0L160 338.7 393.4 105.4c12.5-12.5 32.8-12.5 45.3 0z"
              />
            </svg>
            <span class="successText">
              <span x-text="$t('success.thankYou')"></span><br />
              <span x-text="$t('success.goToReception')"></span>
            </span>
          </div>
        </div>
      </form>
    </div>

    <div
      class="spinnerOverlay"
      x-data
      x-show="$store.loading.active || !$store.i18n.ready"
      x-cloak
      x-effect="document.body.style.overflow = ($store.loading.active || !$store.i18n.ready) ? 'hidden' : ''"
    >
      <div class="spinner"></div>
    </div>
  </body>
</html>
